stages:
  - test
  - static_analysis
  - upload_to_s3

workflow:
  rules:
    # Run detached pipeline for Merge Requests
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    # Do NOT run redundant pipeline for branch if MR is opened for that branch
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    # Run pipeline for branches without related MR (jobs' rules will narrow this requirement)
    - if: '$CI_COMMIT_BRANCH || $CI_COMMIT_TAG'

.exclude-master: &exclude-master
  rules:
    - if: $CI_COMMIT_BRANCH != "master"

.base_installation: &base_installation
  before_script:
    - |
      if [[ "$PHP_VERSION" == "7.2" ]]; then
        echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
        echo "deb http://archive.debian.org/debian-security buster/updates main" >> /etc/apt/sources.list
        echo 'Acquire::Check-Valid-Until "false";' > /etc/apt/apt.conf.d/99no-check-valid-until
      fi
    - apt-get update -qq >/dev/null && apt-get install -qq -y unzip git zip libzip-dev zlib1g-dev >/dev/null

    - |
      if [[ "$PHP_VERSION" == "7.2" ]]; then
        docker-php-ext-configure zip --with-libzip
      fi
    - docker-php-ext-install -j$(nproc) zip > /dev/null
    - curl -sS https://getcomposer.org/installer | php
    - php composer.phar update --no-progress --prefer-stable --quiet --no-interaction --prefer-dist

unit_tests:
  <<: *base_installation
  stage: test
  image: php:$PHP_VERSION-cli
  tags:
    - hq1-small-amd64
  parallel:
    matrix:
      - PHP_VERSION: [ "7.2", "7.3", "7.4", "8.0", "8.1", "8.2", "8.3", "8.4" ]
  script:
    - echo "Running PHPUnit tests ..."
    - ./vendor/bin/phpunit --configuration ./tests/phpunit.xml --colors=never
  <<: *exclude-master

php-stan:
  <<: *base_installation
  stage: static_analysis
  image: php:8.3-cli
  parallel:
    matrix:
      - PHPSTAN_PHP_VERSION: [ "72", "73", "74", "80", "81", "82", "83", "84" ]
  script:
    - ./vendor/bin/phpstan analyse -c phpstan/phpstan-$PHPSTAN_PHP_VERSION.neon src --no-progress --memory-limit=512M
  <<: *exclude-master

php-compatibility:
  <<: *base_installation
  stage: static_analysis
  image: php:8.3-cli
  script:
    - ./vendor/bin/phpcs -s -v --standard=PHPCompatibility --runtime-set testVersion 7.2-8.4 src
  <<: *exclude-master

upload to s3:
  stage: upload_to_s3
  rules:
    - if: $CI_COMMIT_TAG
  tags:
    - hq1-small-amd64
  script:
    - tar --exclude='.git' --exclude='composer.*' --exclude='.gitignore' --exclude='.gitlab-ci.yml' --exclude='README.md' --exclude='CHANGELOG.md' --exclude='Makefile' -czf /tmp/$CI_COMMIT_TAG.tar.gz .
    - mv /tmp/$CI_COMMIT_TAG.tar.gz .
    - aws --only-show-errors --endpoint-url https://s3.eu-central-1.amazonaws.com s3 cp $CI_COMMIT_TAG.tar.gz s3://gr-deployment/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/releases/
